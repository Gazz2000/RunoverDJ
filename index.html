<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>RunoverDJ</title>
<style>
  /*
   * THEME SYSTEM
   * Instead of hardcoding colours everywhere, we define CSS custom properties
   * (variables) on the body. JavaScript swaps these per band and everything
   * that uses them updates automatically — including the transition animation.
   *
   * --bg       : page background
   * --surface  : panel / card background
   * --accent   : highlight colour (band name, slider thumb)
   * --text      : primary text
   * --subtle   : muted text / labels
   * --border   : panel borders
   */

  :root {
    --bg:      #080d12;
    --surface: #0f1e2e;
    --accent:  #4fc3f7;
    --text:    #ddf0ff;
    --subtle:  #4a7a9b;
    --border:  #1a3a5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 16px;
    /* Smooth the whole-page colour transition between bands */
    transition: background 1.2s ease, color 1.2s ease;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--subtle);
    text-transform: uppercase;
    transition: color 1.2s ease;
  }

  /* Band display */
  #band-display {
    text-align: center;
    padding: 16px 32px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 400px;
    transition: background 1.2s ease, border-color 1.2s ease;
  }
  #band-name {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
    transition: color 1.2s ease;
  }
  #score-display {
    font-size: 0.9rem;
    color: var(--subtle);
    margin-top: 4px;
    transition: color 1.2s ease;
  }

  /* Load + play controls */
  .controls {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 400px;
    align-items: center;
  }

  label.file-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--subtle);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 1.2s ease, border-color 1.2s ease, color 1.2s ease;
  }
  #file-input { display: none; }

  button {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--accent);
    font-size: 1.4rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s, border-color 1.2s ease, color 1.2s ease;
  }
  button:disabled { opacity: 0.3; cursor: default; }
  button.playing { background: var(--accent); color: var(--bg); }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    width: 100%;
    max-width: 400px;
    transition: background 1.2s ease, border-color 1.2s ease;
  }
  .panel h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--subtle);
    margin-bottom: 14px;
    transition: color 1.2s ease;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-label {
    width: 60px;
    font-size: 0.8rem;
    color: var(--subtle);
    flex-shrink: 0;
    transition: color 1.2s ease;
  }
  input[type=range] {
    flex: 1;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 3px;
    outline: none;
    transition: background 1.2s ease;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: background 1.2s ease;
  }
  .slider-value {
    width: 54px;
    font-size: 0.8rem;
    color: var(--subtle);
    text-align: right;
    flex-shrink: 0;
    transition: color 1.2s ease;
  }

  .heat-score-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #heat-slider {
    flex: 1;
    height: 8px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(to right, #4fc3f7, #81c784, #fff176, #ffb74d, #ef5350);
    border-radius: 4px;
  }
  #heat-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }

  /* Heat score pane */
  .heat-pane {
    width: 100%;
    max-width: 400px;
    text-align: center;
    padding: 24px 16px 20px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: background 1.2s ease, border-color 1.2s ease;
  }
  #heat-number {
    font-size: 5rem;
    font-weight: 800;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -2px;
    transition: color 1.2s ease;
  }
  #heat-zone {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text);
    margin-top: 6px;
    letter-spacing: 0.08em;
    transition: color 1.2s ease;
  }
  #heat-source {
    font-size: 0.7rem;
    color: var(--subtle);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: color 1.2s ease;
  }

  /* HR pane */
  .hr-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #hr-number {
    font-size: 3rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    min-width: 90px;
    transition: color 1.2s ease;
  }
  #hr-bpm-label {
    font-size: 0.8rem;
    color: var(--subtle);
    transition: color 1.2s ease;
  }
  #hr-updated {
    font-size: 0.75rem;
    color: var(--subtle);
    margin-bottom: 8px;
    transition: color 1.2s ease;
  }
  .connect-btn {
    width: auto !important;
    height: auto !important;
    border-radius: 8px !important;
    padding: 8px 14px !important;
    font-size: 0.8rem !important;
    border: 1px solid var(--border) !important;
  }

  #status {
    font-size: 0.75rem;
    color: #555;
    text-align: center;
  }
</style>
</head>
<body>

<h1>RunoverDJ</h1>

<!-- Heat score pane -->
<div class="heat-pane">
  <div id="heat-number">0</div>
  <div id="heat-zone">Chill</div>
  <div id="heat-source">manual mode</div>
</div>

<!-- HR pane -->
<div class="panel">
  <h2>Heart Rate</h2>
  <div class="hr-row">
    <div>
      <div id="hr-number">—</div>
      <div id="hr-bpm-label">bpm</div>
    </div>
    <div>
      <div id="hr-updated">Not connected</div>
      <button id="hr-connect-btn" class="connect-btn">🫀 Connect Fitbit</button>
    </div>
  </div>
</div>

<!-- File loader + play button -->
<div class="controls">
  <label class="file-btn" for="file-input" id="file-label">
    📂 Choose MP3
  </label>
  <input type="file" id="file-input" accept="audio/*">
  <button id="play-btn" disabled>▶</button>
</div>

<!-- GPS panel -->
<div class="panel">
  <h2>GPS Speed</h2>
  <div style="display:flex; align-items:center; gap:12px;">
    <button id="gps-btn" style="width:auto;height:auto;border-radius:8px;padding:10px 16px;font-size:0.85rem;">
      📍 Start GPS
    </button>
    <div style="flex:1;">
      <div id="gps-speed" style="font-size:1.8rem;font-weight:700;color:var(--accent);transition:color 1.2s;">— km/h</div>
      <div id="gps-status" style="font-size:0.75rem;color:var(--subtle);transition:color 1.2s;">GPS not started</div>
    </div>
  </div>
</div>

<!-- Heat score slider -->
<div class="panel">
  <h2>Heat Score (drag to simulate intensity)</h2>
  <div class="heat-score-row">
    <span style="font-size:0.8rem;color:#555">0</span>
    <input type="range" id="heat-slider" min="0" max="3000" value="0">
    <span style="font-size:0.8rem;color:#555">3000</span>
  </div>
</div>

<!-- Manual effect overrides -->
<div class="panel">
  <h2>Effects (auto-set by heat score — drag to override)</h2>

  <div class="slider-row">
    <span class="slider-label">Filter</span>
    <input type="range" id="filter-slider" min="200" max="20000" value="200">
    <span class="slider-value" id="filter-val">200 Hz</span>
  </div>

  <div class="slider-row">
    <span class="slider-label">Reverb</span>
    <input type="range" id="reverb-slider" min="0" max="100" value="90">
    <span class="slider-value" id="reverb-val">90%</span>
  </div>

  <div class="slider-row">
    <span class="slider-label">Tempo</span>
    <input type="range" id="tempo-slider" min="80" max="107" value="90">
    <span class="slider-value" id="tempo-val">−10%</span>
  </div>
</div>

<div id="status">Load an MP3 to begin</div>

<script>
// ─────────────────────────────────────────────
// HEAT SCORE BANDS (ported from heat_score.py)
// ─────────────────────────────────────────────
const BANDS = [
  {
    name: "Chill",  min: 0,    max: 500,  filterHz: 200,   reverb: 0.9, tempoPct: -10,
    theme: { bg: "#080d12", surface: "#0f1e2e", accent: "#4fc3f7", text: "#ddf0ff", subtle: "#4a7a9b", border: "#1a3a5c" }
  },
  {
    name: "Warmup", min: 500,  max: 1000, filterHz: 800,   reverb: 0.6, tempoPct: -5,
    theme: { bg: "#080e08", surface: "#0f200f", accent: "#69d46e", text: "#ddffde", subtle: "#4a8a4a", border: "#1a4a1a" }
  },
  {
    name: "Steady", min: 1000, max: 1500, filterHz: 2000,  reverb: 0.3, tempoPct: 0,
    theme: { bg: "#0e0e04", surface: "#1e1e08", accent: "#e6e040", text: "#ffffe0", subtle: "#8a8a30", border: "#3a3a10" }
  },
  {
    name: "Push",   min: 1500, max: 2000, filterHz: 5000,  reverb: 0.1, tempoPct: 5,
    theme: { bg: "#110900", surface: "#221400", accent: "#ff9933", text: "#fff0d0", subtle: "#8a5a20", border: "#442200" }
  },
  {
    name: "Beast Mode", min: 2000, max: 9999, filterHz: 20000, reverb: 0.0, tempoPct: 7,
    theme: { bg: "#110000", surface: "#220404", accent: "#ff3333", text: "#ffe0e0", subtle: "#8a3030", border: "#440000" }
  },
];

function lerp(a, b, t) { return a + (b - a) * t; }

function getEffects(score) {
  for (let i = 0; i < BANDS.length; i++) {
    const band = BANDS[i];
    if (score <= band.max) {
      const t = Math.max(0, Math.min(1, (score - band.min) / (band.max - band.min)));
      const next = BANDS[i + 1] || band;
      return {
        band,
        filterHz: lerp(band.filterHz, next.filterHz, t),
        reverb:   lerp(band.reverb,   next.reverb,   t),
        tempoPct: lerp(band.tempoPct, next.tempoPct,  t),
      };
    }
  }
  return { band: BANDS[4], filterHz: 20000, reverb: 0, tempoPct: 10 };
}

// ─────────────────────────────────────────────
// WEB AUDIO SETUP
// ─────────────────────────────────────────────
let audioCtx, sourceNode, filterNode, dryGain, wetGain, convolver;
let audioBuffer = null;
let isPlaying = false;
let startTime = 0;
let pauseOffset = 0;

function buildAudioGraph() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Low-pass filter — this is the main "energy" control
  filterNode = audioCtx.createBiquadFilter();
  filterNode.type = "lowpass";
  filterNode.frequency.value = 200;
  filterNode.Q.value = 0.8;

  // Reverb via convolver with a synthetic impulse response.
  // Theory: a real room's reverb is characterised by its impulse response —
  // how the room responds to a single click. We fake this with decaying noise.
  convolver = audioCtx.createConvolver();
  convolver.buffer = makeImpulse(audioCtx, 2.5, 3.0);

  // Wet/dry gains control how much reverb we blend in
  dryGain = audioCtx.createGain();
  wetGain = audioCtx.createGain();
  dryGain.gain.value = 1.0;
  wetGain.gain.value = 0.0;

  // Graph: filter → dry path + wet (reverb) path → output
  filterNode.connect(dryGain);
  filterNode.connect(convolver);
  convolver.connect(wetGain);
  dryGain.connect(audioCtx.destination);
  wetGain.connect(audioCtx.destination);
}

function makeImpulse(ctx, duration, decay) {
  // Generate exponentially-decaying white noise as a reverb impulse response.
  // Longer duration = bigger room feel. Higher decay = faster fadeout.
  const rate   = ctx.sampleRate;
  const length = Math.floor(rate * duration);
  const buffer = ctx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = buffer.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return buffer;
}

function playAudio() {
  if (!audioBuffer || !audioCtx) return;
  stopAudio();

  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.loop = true;
  sourceNode.connect(filterNode);

  // Apply current tempo — playbackRate 0.9 = 10% slower, 1.1 = 10% faster
  const tempo = parseInt(document.getElementById('tempo-slider').value);
  sourceNode.playbackRate.value = tempo / 100;

  sourceNode.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;

  document.getElementById('play-btn').textContent = '⏸';
  document.getElementById('play-btn').classList.add('playing');
  setStatus('Playing');
}

function stopAudio() {
  if (sourceNode) {
    try {
      pauseOffset = audioCtx.currentTime - startTime;
      sourceNode.stop();
    } catch(e) {}
    sourceNode = null;
  }
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  document.getElementById('play-btn').classList.remove('playing');
}

// ─────────────────────────────────────────────
// APPLY EFFECTS
// ─────────────────────────────────────────────
function applyEffects(filterHz, reverbAmount, tempoPct) {
  if (!audioCtx) return;

  // Smooth transitions using AudioParam's time-based ramp.
  // Instead of a jarring instant jump, the value glides over 0.5 seconds.
  const t = audioCtx.currentTime;
  filterNode.frequency.setTargetAtTime(filterHz, t, 0.5);
  wetGain.gain.setTargetAtTime(reverbAmount, t, 0.5);
  dryGain.gain.setTargetAtTime(1.0 - reverbAmount * 0.5, t, 0.5);

  if (sourceNode) {
    sourceNode.playbackRate.setTargetAtTime((100 + tempoPct) / 100, t, 0.5);
  }

  // Update slider displays
  document.getElementById('filter-slider').value = filterHz;
  document.getElementById('reverb-slider').value = Math.round(reverbAmount * 100);
  document.getElementById('tempo-slider').value  = 100 + tempoPct;
  updateSliderLabels(filterHz, reverbAmount, tempoPct);
}

function updateSliderLabels(filterHz, reverb, tempoPct) {
  document.getElementById('filter-val').textContent =
    filterHz >= 1000 ? (filterHz/1000).toFixed(1) + ' kHz' : Math.round(filterHz) + ' Hz';
  document.getElementById('reverb-val').textContent = Math.round(reverb * 100) + '%';
  const sign = tempoPct >= 0 ? '+' : '';
  document.getElementById('tempo-val').textContent  = sign + tempoPct.toFixed(1) + '%';
}

// updateBandDisplay and updateTheme defined later in the file

// ─────────────────────────────────────────────
// EVENT HANDLERS
// ─────────────────────────────────────────────

// Heat score slider — manual testing mode
document.getElementById('heat-slider').addEventListener('input', function() {
  autoMode = false;
  const score = parseInt(this.value);
  const fx = updateBandDisplay(score);
  document.getElementById('heat-source').textContent = 'manual mode';
  applyEffects(fx.filterHz, fx.reverb, fx.tempoPct);
});

// Manual override sliders
document.getElementById('filter-slider').addEventListener('input', function() {
  const hz = parseInt(this.value);
  if (filterNode) filterNode.frequency.setTargetAtTime(hz, audioCtx.currentTime, 0.3);
  document.getElementById('filter-val').textContent =
    hz >= 1000 ? (hz/1000).toFixed(1) + ' kHz' : hz + ' Hz';
});

document.getElementById('reverb-slider').addEventListener('input', function() {
  const val = parseInt(this.value) / 100;
  if (wetGain) {
    wetGain.gain.setTargetAtTime(val, audioCtx.currentTime, 0.3);
    dryGain.gain.setTargetAtTime(1.0 - val * 0.5, audioCtx.currentTime, 0.3);
  }
  document.getElementById('reverb-val').textContent = this.value + '%';
});

document.getElementById('tempo-slider').addEventListener('input', function() {
  const rate = parseInt(this.value) / 100;
  if (sourceNode) sourceNode.playbackRate.setTargetAtTime(rate, audioCtx.currentTime, 0.3);
  const pct = parseInt(this.value) - 100;
  const sign = pct >= 0 ? '+' : '';
  document.getElementById('tempo-val').textContent = sign + pct + '%';
});

// File loader
document.getElementById('file-input').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file) return;

  document.getElementById('file-label').textContent = '⏳ ' + file.name;
  setStatus('Loading...');

  if (!audioCtx) buildAudioGraph();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  stopAudio();
  pauseOffset = 0;

  const arrayBuffer = await file.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

  document.getElementById('file-label').textContent = '🎵 ' + file.name;
  document.getElementById('play-btn').disabled = false;
  setStatus('Ready — press play');
});

// Play / pause
document.getElementById('play-btn').addEventListener('click', function() {
  if (!audioCtx) buildAudioGraph();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (isPlaying) {
    stopAudio();
    setStatus('Paused');
  } else {
    playAudio();
  }
});

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ─────────────────────────────────────────────
// KALMAN FILTER FOR GPS SPEED
// ─────────────────────────────────────────────
//
// Theory: a Kalman filter tracks an estimate and its uncertainty together.
// Each cycle has two steps:
//
//   PREDICT: assume the value drifts slightly (process noise Q).
//            uncertainty grows a little — we're less sure where we are.
//
//   UPDATE:  a new measurement arrives with its own uncertainty (R).
//            Kalman Gain K = how much to trust the new reading vs our estimate.
//            K near 1 = trust the new reading. K near 0 = trust our estimate.
//            We blend them: estimate = estimate + K * (measurement - estimate)
//            Then shrink uncertainty: P = (1 - K) * P
//
// For GPS speed, measurement noise R comes directly from the phone's reported
// accuracy — a less accurate fix gets a higher R, so K is smaller, so we
// trust our running estimate more. Jumpy readings barely move the output.

class KalmanFilter {
  constructor(processNoise = 0.1, measureNoise = 1.0) {
    this.Q = processNoise;   // how much the true speed can change between readings
    this.R = measureNoise;   // default measurement uncertainty
    this.P = 1.0;            // current estimate uncertainty
    this.x = 0;              // current speed estimate (km/h)
    this.initialised = false;
  }

  update(measuredSpeed, accuracyMetres) {
    // Scale measurement noise by GPS accuracy.
    // A 20m accuracy reading is 4x less trustworthy than a 5m reading.
    const R = this.R * (accuracyMetres / 5.0);

    if (!this.initialised) {
      // Seed the filter with the first real reading rather than 0
      this.x = measuredSpeed;
      this.initialised = true;
      return this.x;
    }

    // Predict step: uncertainty grows (we don't know if they sped up/slowed down)
    this.P = this.P + this.Q;

    // Update step: blend measurement with prediction
    const K = this.P / (this.P + R);        // Kalman gain
    this.x = this.x + K * (measuredSpeed - this.x);
    this.P = (1 - K) * this.P;

    return this.x;
  }

  reset() {
    this.P = 1.0;
    this.x = 0;
    this.initialised = false;
  }
}

// ─────────────────────────────────────────────
// GPS
// ─────────────────────────────────────────────
const kalman = new KalmanFilter(0.5, 2.0);
let gpsWatchId = null;
let lastPos = null;   // fallback for devices that don't report speed natively

// Current smoothed speed in km/h — other modules read this
let currentSpeedKmh = 0;

function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gps-status').textContent = 'GPS not supported in this browser';
    return;
  }

  document.getElementById('gps-status').textContent = 'Acquiring signal...';
  document.getElementById('gps-btn').textContent = '⏹ Stop GPS';

  gpsWatchId = navigator.geolocation.watchPosition(
    onPosition,
    onGPSError,
    {
      enableHighAccuracy: true,   // use GPS chip, not cell/wifi
      maximumAge: 2000,           // accept cached positions up to 2s old
      timeout: 10000              // fail if no fix within 10s
    }
  );
}

function stopGPS() {
  if (gpsWatchId !== null) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  kalman.reset();
  lastPos = null;
  currentSpeedKmh = 0;
  document.getElementById('gps-speed').textContent = '— km/h';
  document.getElementById('gps-status').textContent = 'GPS stopped';
  document.getElementById('gps-btn').textContent = '📍 Start GPS';
}

function onPosition(pos) {
  const accuracy = pos.coords.accuracy;   // metres

  // Prefer the native speed if the device provides it (most Android phones do)
  // It's in m/s — convert to km/h
  let rawSpeed;
  if (pos.coords.speed !== null && pos.coords.speed >= 0) {
    rawSpeed = pos.coords.speed * 3.6;
  } else {
    rawSpeed = calcSpeedFromPositions(pos);
  }

  // Clamp negatives (can happen briefly on a cold fix)
  rawSpeed = Math.max(0, rawSpeed);

  // Run through Kalman filter
  currentSpeedKmh = kalman.update(rawSpeed, accuracy);
  currentSpeedKmh = Math.max(0, currentSpeedKmh);

  lastPos = pos;
  checkAutoMode();

  // Update display
  document.getElementById('gps-speed').textContent = currentSpeedKmh.toFixed(1) + ' km/h';
  const accText = accuracy < 10 ? '✅ ' + Math.round(accuracy) + 'm accuracy'
                : accuracy < 25 ? '⚠️ ' + Math.round(accuracy) + 'm accuracy'
                :                  '❌ Poor signal (' + Math.round(accuracy) + 'm)';
  document.getElementById('gps-status').textContent = accText;
}

function calcSpeedFromPositions(pos) {
  // Fallback: calculate speed from the distance between two position fixes.
  // Uses the Haversine formula — same maths as "as the crow flies" distance
  // between two lat/long points on a sphere.
  if (!lastPos) return 0;

  const dt = (pos.timestamp - lastPos.timestamp) / 1000; // seconds
  if (dt <= 0 || dt > 10) return 0;

  const R   = 6371000; // Earth radius in metres
  const φ1  = lastPos.coords.latitude  * Math.PI / 180;
  const φ2  = pos.coords.latitude      * Math.PI / 180;
  const Δφ  = (pos.coords.latitude  - lastPos.coords.latitude)  * Math.PI / 180;
  const Δλ  = (pos.coords.longitude - lastPos.coords.longitude) * Math.PI / 180;

  const a = Math.sin(Δφ/2) * Math.sin(Δφ/2)
          + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
  const distMetres = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

  return (distMetres / dt) * 3.6; // m/s → km/h
}

function onGPSError(err) {
  const msgs = {
    1: 'Location permission denied — allow it in browser settings',
    2: 'GPS signal unavailable',
    3: 'GPS timed out — try again outdoors',
  };
  document.getElementById('gps-status').textContent = msgs[err.code] || 'GPS error';
}

document.getElementById('gps-btn').addEventListener('click', function() {
  if (gpsWatchId !== null) {
    stopGPS();
  } else {
    startGPS();
  }
});

// ─────────────────────────────────────────────
// HEAT SCORE — AUTO CALCULATION
// ─────────────────────────────────────────────
// Ported directly from heat_score.py.
// Runs every 5 seconds; wires GPS speed + HR into the score.

const SMOOTHING_FACTOR = 0.8;
const SPEED_FLOOR_FRACTION = 0.7;

let smoothedScore  = 0;
let lastNonZeroSpd = 0;
let currentHR      = 0;
let autoMode       = false;   // true once both GPS and HR are live

function tickHeatScore() {
  if (!autoMode) return;

  const effectiveSpeed = currentSpeedKmh > 0.5
    ? currentSpeedKmh
    : lastNonZeroSpd * SPEED_FLOOR_FRACTION;

  if (currentSpeedKmh > 0.5) lastNonZeroSpd = currentSpeedKmh;

  const raw = effectiveSpeed * currentHR;
  smoothedScore = smoothedScore === 0
    ? raw
    : SMOOTHING_FACTOR * smoothedScore + (1 - SMOOTHING_FACTOR) * raw;

  const fx = getEffects(smoothedScore);
  document.getElementById('heat-number').textContent = Math.round(smoothedScore);
  document.getElementById('heat-zone').textContent   = fx.band.name;
  document.getElementById('heat-source').textContent = 'live: ' +
    currentSpeedKmh.toFixed(1) + ' km/h × ' + currentHR + ' bpm';

  // Swap theme + apply audio effects
  updateTheme(fx.band.theme);
  applyEffects(fx.filterHz, fx.reverb, fx.tempoPct);
}

setInterval(tickHeatScore, 5000);

// Called by GPS and HR code when data arrives to switch into auto mode
function checkAutoMode() {
  if (currentHR > 0 && currentSpeedKmh >= 0) autoMode = true;
}

// Override updateBandDisplay to also update the new heat pane
function updateBandDisplay(score) {
  const fx = getEffects(score);
  document.getElementById('heat-number').textContent = Math.round(score);
  document.getElementById('heat-zone').textContent   = fx.band.name;
  updateTheme(fx.band.theme);
  return fx;
}

function updateTheme(t) {
  const root = document.documentElement;
  root.style.setProperty('--bg',      t.bg);
  root.style.setProperty('--surface', t.surface);
  root.style.setProperty('--accent',  t.accent);
  root.style.setProperty('--text',    t.text);
  root.style.setProperty('--subtle',  t.subtle);
  root.style.setProperty('--border',  t.border);
}

// ─────────────────────────────────────────────
// GOOGLE OAUTH — PKCE FLOW
// ─────────────────────────────────────────────
// PKCE (Proof Key for Code Exchange) lets a frontend app do OAuth without
// embedding a client secret. Instead:
//   1. We generate a random 'code_verifier'
//   2. Hash it → 'code_challenge', sent with the auth request
//   3. When we exchange the code for a token, we send the original verifier
//   4. Google checks the hash matches — proves we made the original request

const OAUTH = {
  clientId:    '807162253610-cij4bd0ch2v5a37a9jeqdevuc3qch0du.apps.googleusercontent.com',
  redirectUri: 'https://gazz2000.github.io/RunoverDJ/',
  scope:       'https://www.googleapis.com/auth/googlehealth.health_metrics_and_measurements.readonly',
  authUrl:     'https://accounts.google.com/o/oauth2/v2/auth',
  tokenUrl:    'https://oauth2.googleapis.com/token',
};

function generateVerifier() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function generateChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function startFitbitAuth() {
  const verifier   = generateVerifier();
  const challenge  = await generateChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);

  const params = new URLSearchParams({
    response_type:         'code',
    client_id:             OAUTH.clientId,
    redirect_uri:          OAUTH.redirectUri,
    scope:                 OAUTH.scope,
    code_challenge:        challenge,
    code_challenge_method: 'S256',
    access_type:           'offline',
    prompt:                'consent',
  });
  window.location.href = `${OAUTH.authUrl}?${params}`;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const res = await fetch(OAUTH.tokenUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type:    'authorization_code',
      code,
      redirect_uri:  OAUTH.redirectUri,
      client_id:     OAUTH.clientId,
      code_verifier: verifier,
    }),
  });
  return res.json();
}

async function refreshAccessToken() {
  const refresh = localStorage.getItem('hr_refresh_token');
  if (!refresh) return null;
  const res = await fetch(OAUTH.tokenUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type:    'refresh_token',
      refresh_token: refresh,
      client_id:     OAUTH.clientId,
    }),
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem('hr_access_token', data.access_token);
    localStorage.setItem('hr_token_expiry', Date.now() + data.expires_in * 1000);
    return data.access_token;
  }
  return null;
}

async function getValidToken() {
  const expiry = parseInt(localStorage.getItem('hr_token_expiry') || '0');
  if (Date.now() < expiry - 60000) {
    return localStorage.getItem('hr_access_token');
  }
  return await refreshAccessToken();
}

function isFitbitConnected() {
  return !!localStorage.getItem('hr_refresh_token');
}

// ─────────────────────────────────────────────
// HEART RATE POLLING
// ─────────────────────────────────────────────

function findNested(obj, key) {
  if (typeof obj !== 'object' || obj === null) return null;
  if (key in obj) return obj[key];
  for (const v of Object.values(obj)) {
    const r = findNested(v, key);
    if (r !== null) return r;
  }
  return null;
}

function formatHRTimestamp(point) {
  try {
    const month = findNested(point, 'month');
    const day   = findNested(point, 'day');
    const time  = findNested(point, 'time');
    if (time && month && day) {
      const h = String(time.hours   || 0).padStart(2,'0');
      const m = String(time.minutes || 0).padStart(2,'0');
      return `${day}/${month} ${h}:${m}`;
    }
  } catch(e) {}
  return 'unknown time';
}

async function pollHR() {
  const token = await getValidToken();
  if (!token) {
    document.getElementById('hr-updated').textContent = 'Token expired — reconnect';
    document.getElementById('hr-connect-btn').textContent = '🫀 Reconnect Fitbit';
    return;
  }

  const now   = new Date();
  const start = new Date(now - 30 * 60 * 1000);
  const fmt   = d => d.toISOString().replace(/\.\d{3}Z$/, 'Z');
  const filter = `heart_rate.sample_time.physical_time >= "${fmt(start)}" AND heart_rate.sample_time.physical_time < "${fmt(now)}"`;

  try {
    const res  = await fetch(
      `https://health.googleapis.com/v4/users/me/dataTypes/heart-rate/dataPoints?` +
      new URLSearchParams({ filter, pageSize: 10 }),
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const data = await res.json();
    const pts  = data.dataPoints || [];

    if (pts.length > 0) {
      const bpm = findNested(pts[0], 'beatsPerMinute');
      if (bpm) {
        currentHR = parseInt(bpm);
        document.getElementById('hr-number').textContent  = currentHR;
        document.getElementById('hr-updated').textContent = 'Updated ' + formatHRTimestamp(pts[0]);
        checkAutoMode();
      }
    } else {
      document.getElementById('hr-updated').textContent = 'No data — open Fitbit app to sync';
    }
  } catch(e) {
    document.getElementById('hr-updated').textContent = 'Poll failed — ' + e.message;
  }
}

let hrPollInterval = null;

function startHRPolling() {
  document.getElementById('hr-connect-btn').textContent = '🔌 Disconnect';
  document.getElementById('hr-updated').textContent = 'Polling...';
  pollHR();
  hrPollInterval = setInterval(pollHR, 30000);
}

document.getElementById('hr-connect-btn').addEventListener('click', function() {
  if (isFitbitConnected() && hrPollInterval) {
    clearInterval(hrPollInterval);
    hrPollInterval = null;
    currentHR = 0;
    localStorage.removeItem('hr_access_token');
    localStorage.removeItem('hr_refresh_token');
    localStorage.removeItem('hr_token_expiry');
    document.getElementById('hr-number').textContent  = '—';
    document.getElementById('hr-updated').textContent = 'Disconnected';
    this.textContent = '🫀 Connect Fitbit';
    autoMode = false;
  } else {
    startFitbitAuth();
  }
});

// ─────────────────────────────────────────────
// HANDLE OAUTH REDIRECT ON PAGE LOAD
// ─────────────────────────────────────────────
// After Google redirects back, the URL contains ?code=...
// We catch it here, exchange for tokens, clean up the URL.

(async function handleOAuthRedirect() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  if (!code) {
    // No redirect — check if we have a stored token and auto-start polling
    if (isFitbitConnected()) startHRPolling();
    return;
  }

  document.getElementById('hr-updated').textContent = 'Completing sign-in...';
  // Clean the auth code from the URL so refresh doesn't re-trigger the flow
  history.replaceState({}, '', window.location.pathname);

  try {
    const tokens = await exchangeCode(code);
    if (tokens.access_token) {
      localStorage.setItem('hr_access_token',  tokens.access_token);
      localStorage.setItem('hr_token_expiry',  Date.now() + tokens.expires_in * 1000);
      if (tokens.refresh_token) {
        localStorage.setItem('hr_refresh_token', tokens.refresh_token);
      }
      sessionStorage.removeItem('pkce_verifier');
      startHRPolling();
    } else {
      document.getElementById('hr-updated').textContent =
        'Sign-in failed: ' + (tokens.error_description || tokens.error || 'unknown error');
    }
  } catch(e) {
    document.getElementById('hr-updated').textContent = 'Sign-in error: ' + e.message;
  }
})();

// Initial display
updateBandDisplay(0);
document.getElementById('heat-source').textContent = 'manual mode';
</script>
